# Release workflow for Outset.
#
# Triggers on a tag push that looks like a semver (v0.0.2, v1.2.3, etc.).
# Builds the app for macOS arm64 only — Intel was dropped to halve runner
# cost and because Apple Silicon has been the only target worth shipping
# for a while. Signs the artifacts using a minisign keypair stored in
# GitHub Secrets, uploads the bundles to a GitHub Release named after the
# tag, and writes a `latest.json` manifest alongside them so
# `@tauri-apps/plugin-updater` can find the new version.
#
# Setup once, locally:
#   yarn tauri signer generate -w ~/.tauri/outset.key
#       → writes a private key (KEEP SECRET) and prints the public key.
#   - Put the public key in src-tauri/tauri.conf.json under
#     plugins.updater.pubkey.
#   - Add the contents of ~/.tauri/outset.key to GitHub repository
#     secrets as TAURI_SIGNING_PRIVATE_KEY.
#   - Add the password you used (or empty) as TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
#
# Cutting a release:
#   git tag v0.0.2 && git push origin v0.0.2
#   → CI builds, signs, publishes a Release, and users on prior versions
#     see the update banner on next launch.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14 # Apple Silicon
    # Repeat at the job level. The workflow-level `permissions:` block
    # above SHOULD be enough, but in some repos GitHub's permissions
    # resolver needs it declared on the job that actually consumes the
    # token (tauri-action calls the Releases API with GITHUB_TOKEN).
    permissions:
      contents: write
    env:
      # Single target — referenced by Rust toolchain install, sidecar
      # build, and tauri-action's `args`. Hoisted to env so adding
      # another target in the future is a one-line matrix change.
      TARGET: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        # Bumped past v4 (Node 20 runtime, deprecated) and v5 to land on
        # the current major. The `node-version` below is what the action
        # installs for our build steps — separate from the runtime the
        # action itself runs on.
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: Setup Bun
        # Used only by `yarn sidecar:build` below. The sidecar is bundled
        # into a single self-contained executable via `bun build --compile`
        # so the shipped app doesn't need Node, tsx, or node_modules at
        # runtime.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck sidecar
        run: yarn sidecar:typecheck

      - name: Build sidecar binary
        # Compiles sidecar/src/index.ts to
        # src-tauri/binaries/outset-sidecar-${{ env.TARGET }}, which
        # tauri.conf.json's bundle.externalBin then ships inside the app.
        # `tauri-action` below also runs sidecar:build via beforeBuildCommand,
        # but doing it explicitly here gives us a clear failure point and a
        # cached step.
        run: yarn sidecar:build --target=${{ env.TARGET }}

      - name: Build + sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Minisign keys for the in-app auto-updater. Distinct from the
          # Apple signing path below — these protect update integrity,
          # those satisfy macOS Gatekeeper.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing. tauri-action picks these up
          # automatically: it imports the .p12 into a temporary keychain
          # for the build step, signs with APPLE_SIGNING_IDENTITY, then
          # cleans up. Notarization runs as a follow-up using the Apple
          # ID + app-specific password + Team ID.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Outset ${{ github.ref_name }}"
          releaseBody: |
            See the commits since the previous release for what changed.

            On launch, the app checks for this release automatically and
            offers an in-place update via the bottom-right banner.
          releaseDraft: false
          prerelease: false
          args: --target ${{ env.TARGET }}
